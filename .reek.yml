directories:
  "test":
    IrresponsibleModule:
      enabled: false
    DuplicateMethodCall:
      enabled: false
    TooManyStatements:
      enabled: false
    FeatureEnvy:
      enabled: false
    InstanceVariableAssumption:
      enabled: false
    UtilityFunction:
      enabled: false
    NestedIterators:
      enabled: false
    UncommunicativeVariableName:
      enabled: false
    ControlParameter:
      enabled: false
    TooManyMethods:
      enabled: false
    UnusedParameters:
      enabled: false
    UncommunicativeMethodName:
      enabled: false
  "lib":
    UtilityFunction:
      enabled: false

detectors:
  InstanceVariableAssumption:
    exclude:
      - "Evaluator::Config"
      - "Evaluator::Clients::Providers::OpenAI"
      - "Evaluator::Clients::Providers::Gemini"
      - "Evaluator::Clients::Providers::Ollama"
      - "Evaluator::Clients::Providers::Anthropic"
      - "Evaluator::Clients::Providers::AzureOpenAI"
      - "Evaluator::Clients::Providers::DeepSeek"
      - "Evaluator::Clients::Providers::Groq"
      - "Evaluator::Clients::Providers::OpenCode"
  MissingSafeMethod:
    enabled: false
  ControlParameter:
    exclude:
      - "Evaluator::Tools::Base"
      - "Evaluator::EvaluateCommand#print_parse_error"
      - "AgentEval::OutputFormatter#self.format"
      - "AgentEval::Commands::Run#validate_api_key"
  DuplicateMethodCall:
    exclude:
      - "Evaluator::Client#call"
      - "Evaluator::ContextHydrator#call"
      - "Evaluator::ReactAgent#call"
      - "Evaluator::Runner#call"
      - "Evaluator::AgentRunner#print_header"
      - "Evaluator::Config#load_and_merge_json"
      - "Evaluator::Clients::Providers::Gemini#initialize"
      - "Evaluator::Clients::BaseClient#execute_request"
      - "Evaluator::Tools::Base#verify_component_safety!"
      - "Evaluator::Tools::WriteFile#self.call"
      - "AgentEval::OutputFormatter#self.format_human"
      - "AgentEval::OutputFormatter#self.format_junit"
      - "AgentEval::Migration::ProviderMigrator#self.migrate"
      - "AgentEval::Commands::Run"
      - "AgentEval::Models::Config#self.load"
      - "AgentEval::Services::RunnerService#spawn_agent"
      - "Evaluator::Clients::RequestBuilder#self.build_connection"
      - "Evaluator::Clients::ResponseErrorHandler#self.failure_response"
      - "Evaluator::Clients::ResponseParser#self.extract_openai_message"
      - "Evaluator::Clients::ResponseParser#self.parse_body"
      - "Evaluator::ErrorLogger#log_error"
  UncommunicativeVariableName:
    accept:
      - e
      - f
      - id
  TooManyInstanceVariables:
    max_instance_variables: 6
    exclude:
      - "Evaluator::Clients::BaseClient"
  TooManyStatements:
    max_statements: 25
    exclude:
      - "AgentEval::Commands::Run"
  TooManyMethods:
    max_methods: 15
    exclude:
      - "Evaluator::Clients::BaseClient"
      - "Evaluator::Clients::Providers::Anthropic"
  DataClump:
    exclude:
      - "Evaluator::Tools"
  FeatureEnvy:
    exclude:
      - "Evaluator::ContextHydrator#build_xml"
      - "Evaluator::Clients::BaseClient#handle_response"
      - "Evaluator::Clients::Providers::Gemini#config_error"
      - "Evaluator::Clients::Providers::Anthropic#config_error"
      - "Evaluator::Clients::Providers::AzureOpenAI#config_error"
      - "AgentEval::Models::Config#find_provider"
      - "AgentEval::Models::Config#providers"
      - "AgentEval::Services::RunnerService#spawn_agent"
      - "Evaluator::Clients::BaseClient#config_error"
  BooleanParameter:
    exclude:
      - "AgentEval::Commands::Init#self.run"
  UtilityFunction:
    enabled: false
  NilCheck:
    exclude:
      - "Evaluator::ReactAgent#call"
      - "Evaluator::Clients::BaseClient#handle_response"
      - "Evaluator::SourcePathResolver#self.call"
      - "Evaluator::EvaluateCommand#call"
      - "Evaluator::EvaluateCommand#print_task_result"
      - "Evaluator::HistoryRecorder#normalize_score"
      - "Evaluator::HistoryRecorder#self.summarize"
      - "Evaluator::Clients::Providers::Anthropic#parse_tool_arguments"
      - "Evaluator::Clients::BaseClient#missing_config_keys"
      - "Evaluator::Clients::ResponseParser#self.valid_message?"
  NestedIterators:
    exclude:
      - "Evaluator::EvaluateCommand#parse_options"
  RepeatedConditional:
    exclude:
      - "AgentEval::OutputFormatter"
      - "AgentEval::Commands::Run"
  UnusedParameters:
    exclude:
      - "AgentEval::Skills::New#initialize"
      - "AgentEval::Skills::TestService#initialize"
  LongParameterList:
    max_params: 5
  ManualDispatch:
    exclude:
      - "AgentEval::Models::Config#self.load"
