plugins:
  - rubocop-minitest
  - rubocop-rake
  - rubocop-yard

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 3.1
  NewCops: enable
  Exclude:
    - 'evals/**/*'
    - 'examples/**/*'
    - 'vendor/**/*'
    - 'bin/**/*'
    - 'tmp/**/*'

Metrics/MethodLength:
  Max: 60

Metrics/AbcSize:
  Max: 50

Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'lib/skill_bench/cli.rb'

Metrics/BlockLength:
  Max: 40

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Minitest/MultipleAssertions:
  Max: 10

Style/Documentation:
  Enabled: true

Style/DocumentationMethod:
  Enabled: true
  RequireForNonPublicMethods: false

Layout/LineLength:
  Max: 200
